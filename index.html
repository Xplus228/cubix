<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Официальный сайт</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background: #000 url('background-red.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; }
        
        h1 { font-size: clamp(40px, 10vw, 80px); text-shadow: 0 0 20px red; margin: 20px 0; }
        
        .button {
            display: inline-block; background: white; border: 2px solid white;
            padding: 15px 30px; color: black; text-decoration: none;
            font-size: 20px; border-radius: 12px; transition: 0.3s; cursor: pointer;
        }
        .button:hover { background: red; border-color: red; color: white; transform: scale(1.05); }

        /* Секция галереи */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            margin: 40px 0; 
        }
        .gallery-item { 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            transition: 0.3s;
        }
        .gallery-item:hover { border-color: red; background: rgba(255,0,0,0.1); }
        .gallery img { width: 100%; border-radius: 10px; cursor: pointer; aspect-ratio: 16/9; object-fit: cover; }
        .author-tag { font-size: 14px; margin-top: 8px; color: #aaa; }

        /* Форма загрузки */
        .upload-card { 
            background: rgba(0,0,0,0.6); 
            padding: 30px; 
            border-radius: 20px; 
            border: 2px dashed #444; 
            margin: 40px 0; 
        }
        .upload-card:hover { border-color: red; }
        
        input[type="text"] { 
            background: #111; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 8px; width: 100%; 
            max-width: 300px; margin-bottom: 15px; text-align: center; 
        }

        .version-box { 
            background: rgba(0,0,0,0.9); padding: 20px; 
            border-left: 5px solid red; text-align: left; margin: 20px 0; 
        }

        /* Просмотр фото */
        .viewer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; 
            justify-content: center; align-items: center; flex-direction: column; 
        }
        .viewer img { max-width: 90%; max-height: 80%; border: 2px solid white; box-shadow: 0 0 30px red; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>CubiX</h1>
        <a class="button" href="ССЫЛКА_НА_ДИСК" onclick="countDL('v05')">СКАЧАТЬ v0.5</a>
    </div>

    <div class="section">
        <h2>Галерея Сообщества</h2>
        <div id="gallery" class="gallery">
            </div>

        <div class="upload-card">
            <h3>Прислать скриншот</h3>
            <input type="text" id="userNick" placeholder="Твой ник в игре"><br>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button class="button" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
            <p id="statusMsg" style="margin-top:15px; color: #888; font-size: 14px;"></p>
        </div>
    </div>

    <div class="section">
        <h2>Версии</h2>
        <div class="version-box">
            <h3>v0.5 <span style="float:right; color:red;" id="v05-count">0 скачиваний</span></h3>
            <p>Стабильная версия. Добавлены новые блоки.</p>
        </div>
    </div>
</div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
    <img id="viewImg">
    <p id="viewAuthor" style="margin-top: 10px; font-size: 20px;"></p>
</div>

<script>
    // --- 1. ТВОЙ КОНФИГ FIREBASE ---
    const firebaseConfig = {
        apiKey: "ТВОЙ_API_KEY",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    // --- 2. ЛОГИКА ЗАГРУЗКИ ---
    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        const nick = document.getElementById('userNick').value.trim() || "Аноним";
        const status = document.getElementById('statusMsg');

        if(!file) return;

        // Лимит 5 МБ (защита твоего бесплатного плана)
        if(file.size > 5 * 1024 * 1024) {
            alert("Файл слишком тяжелый! Максимум 5 МБ.");
            return;
        }

        status.innerText = "⏳ Загрузка на проверку...";

        try {
            const fileName = Date.now() + "_" + file.name;
            const ref = storage.ref('submissions/' + fileName);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            // Сохраняем в ветку moderation
            await db.ref('moderation').push({
                url: url,
                author: nick,
                time: new Date().toLocaleString()
            });

            // УВЕДОМЛЕНИЕ В TELEGRAM
            const token = "ТВОЙ_ТОКЕН_БОТА";
            const chat = "ТВОЙ_ID_ЧАТА";
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            
            const text = `📸 *CubiX: Новый скриншот!*\n\n` +
                         `👤 Автор: ${nick}\n` +
                         `📦 Размер: ${sizeMB} MB\n\n` +
                         `🔗 [ПОСМОТРЕТЬ ФОТО](${url})\n\n` +
                         `Чтобы одобрить, скопируй данные в Firebase из папки 'moderation' в 'gallery'.`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&parse_mode=Markdown&text=${encodeURIComponent(text)}`);

            status.style.color = "#00ff00";
            status.innerText = "✅ Отправлено! После проверки скриншот появится в галерее.";
            document.getElementById('fileInput').value = "";
        } catch (e) {
            console.error(e);
            status.innerText = "❌ Ошибка загрузки. Проверь консоль.";
        }
    }

    // --- 3. ЖИВАЯ ГАЛЕРЕЯ (Одобренные скрины) ---
    db.ref('gallery').on('value', snap => {
        const container = document.getElementById('gallery');
        container.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            container.innerHTML += `
                <div class="gallery-item">
                    <img src="${data.url}" onclick="openFull('${data.url}', '${data.author}')">
                    <div class="author-tag">Автор: ${data.author}</div>
                </div>
            `;
        });
    });

    // --- 4. СЧЕТЧИК СКАЧИВАНИЙ ---
    function countDL(v) {
        db.ref('downloads/' + v).transaction(c => (c || 0) + 1);
    }
    db.ref('downloads/v05').on('value', snap => {
        document.getElementById('v05-count').innerText = (snap.val() || 0) + " скачиваний";
    });

    function openFull(u, a) {
        document.getElementById('viewer').style.display = 'flex';
        document.getElementById('viewImg').src = u;
        document.getElementById('viewAuthor').innerText = "Скриншот от: " + a;
    }
</script>

</body>
</html>
