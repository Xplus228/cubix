<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CubiX</title>

<style>
@font-face {
    font-family: Door;
    src: url('door.otf');
}

* {
    font-family: Door, Arial;
    box-sizing: border-box;
}

body {
    margin: 0;
    background: url('background-red.png');
    background-size: cover;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: -1;
}

/* HERO */
.hero {
    padding: 120px 20px;
    text-align: center;
}

h1 {
    font-size: 80px;
}

/* КНОПКА */
.button {
    display: inline-block;
    background: white;
    border: 2px solid white;
    padding: 15px 30px;
    color: black;
    text-decoration: none;
    font-size: 20px;
    border-radius: 12px;
    transition: 0.3s;
}

.button:hover {
    background: black;
    color: white;
}

/* СЕКЦИИ */
.section {
    padding: 60px;
    text-align: center;
}

/* ВЕРСИИ */
.version {
    margin: 20px auto;
    padding: 25px;
    background: rgba(0,0,0,0.8);
    border-left: 5px solid red;
    max-width: 600px;
}

/* ГАЛЕРЕЯ */
#gallery {
    text-align: center;
}

.gallery-item {
    display: inline-block;
    margin: 10px;
}

.gallery img {
    width: 250px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

.name {
    font-size: 14px;
}

.author {
    font-size: 12px;
    opacity: 0.7;
}

/* FULLSCREEN */
.fullscreen {
    display: none;
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.fullscreen img {
    max-width: 90%;
}

/* SOUND PANEL */
.sound-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>CubiX</h1>
    <a class="button" href="https://drive.google.com/file/d/13sFn3THSF_5-CxYdcR2fd0udfEVBN7rn/view" onclick="download('v05')">
        Скачать
    </a>
</div>

<div class="section">
    <h2>Скриншоты</h2>
    <div id="gallery" class="gallery"></div>
    <button class="button" onclick="showMore()">Показать ещё</button>
</div>

<div class="section">
    <h2>Версии</h2>

    <div class="version">
        <h3>v0.5 (последняя)</h3>
        <p>Исправлен баг с PvP. Добавлен новый интерфейс.</p>
        <p>Скачиваний: <span id="count-v05">0</span></p>
        <a class="button" href="https://drive.google.com/file/d/13sFn3THSF_5-CxYdcR2fd0udfEVBN7rn/view" onclick="download('v05')">Скачать</a>
    </div>

    <div class="version">
        <h3>v0.45</h3>
        <p>Добавлено много изменений.</p>
        <p>Скачиваний: <span id="count-v045">0</span></p>
        <a class="button" href="https://drive.google.com/file/d/1B8b5vj9AWSkbE95AyGnfol6ywoJxJ7tP/view" onclick="download('v045')">Скачать</a>
    </div>

</div>

<div class="section">
    <p>Добавить скриншот:</p>
    <p><b>xplus.official10@gmail.com</b></p>
</div>

<div class="fullscreen" id="viewer" onclick="closeImg()">
    <img id="bigImg">
    <p id="imgName"></p>
</div>

<!-- AUDIO -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="bgMusic" src="music.mp3" loop></audio>

<!-- SOUND CONTROL -->
<div class="sound-panel">
    🔊 <input type="range" min="0" max="1" step="0.01" value="0.5" onchange="setVolume(this.value)">
</div>

<script>
let images = [
    "cube-cubix.png",
    "cover-cubix.png",
    "bomb-cubix.png",
    "coin-cubix.png",
    "blue-player-cubix.png"
];

let visible = 3;

function cleanName(name) {
    return name.replace("-cubix.png", "");
}

function render() {
    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    images.slice(0, visible).forEach(img => {
        gallery.innerHTML += `
        <div class="gallery-item">
            <img src="${img}" onclick="openImg('${img}')">
            <div class="name">${cleanName(img)}</div>
            <div class="author">Автор: Xplus</div>
        </div>
        `;
    });
}

function showMore() {
    visible += 3;
    render();
}

function openImg(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("bigImg").src = src;
    document.getElementById("imgName").innerText = cleanName(src);
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}

/* SOUND */
let clickSound = document.getElementById("clickSound");
let bgMusic = document.getElementById("bgMusic");

bgMusic.volume = 0.5;

document.addEventListener("click", () => {
    clickSound.currentTime = 0;
    clickSound.play();
});

document.body.addEventListener("click", () => {
    bgMusic.play();
}, { once: true });

function setVolume(v) {
    bgMusic.volume = v;
}

/* DOWNLOAD COUNTER */
function download(version) {
    let key = "downloads_" + version;
    let count = localStorage.getItem(key) || 0;
    count++;
    localStorage.setItem(key, count);

    document.getElementById("count-" + version).innerText = count;
}

/* INIT */
render();
</script>

</body>
</html>
