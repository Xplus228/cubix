<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CubiX | Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .button { background: white; padding: 15px 30px; color: black; border-radius: 10px; cursor: pointer; border: none; font-size: 20px; }
        input, textarea { background: #111; border: 1px solid #333; color: white; padding: 10px; width: 300px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>CubiX</h1>
    <button id="loginBtn" class="button" onclick="login()">Войти через Google</button>
    <div id="upload-section" style="display:none; margin-top: 20px;">
        <textarea id="userDesc" placeholder="Описание..."></textarea><br>
        <input type="file" id="fileInput" accept="image/*" onchange="handleUpload()">
        <p id="statusMsg" style="color: #f1c40f;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
            authDomain: "cubix-web.firebaseapp.com",
            projectId: "cubix-web",
            storageBucket: "cubix-web.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const storage = firebase.storage();

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(user => {
            document.getElementById('loginBtn').style.display = user ? 'none' : 'block';
            document.getElementById('upload-section').style.display = user ? 'block' : 'none';
        });

        async function handleUpload() {
            const file = document.getElementById('fileInput').files[0];
            const desc = document.getElementById('userDesc').value;
            const s = document.getElementById('statusMsg');
            if(!file || !auth.currentUser) return;

            s.innerText = "⏳ Отправка...";
            try {
                const ref = storage.ref('submissions/' + Date.now() + "_" + file.name);
                await ref.put(file);
                const imageUrl = await ref.getDownloadURL();

                // ОТПРАВКА
                const response = await fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        photoUrl: imageUrl, 
                        author: auth.currentUser.displayName, 
                        desc: desc 
                    })
                });

                if(response.ok) s.innerText = "✅ Доставлено!";
                else s.innerText = "❌ Ошибка сервера";
            } catch (e) {
                s.innerText = "❌ Ошибка: " + e.message;
            }
        }
    </script>
</body>
</html>
