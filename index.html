<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background-color: #000; color: white; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('background-red.png') center/cover; z-index: -2; transition: 0.8s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        /* Профиль */
        .auth-bar { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid red; cursor: pointer; transition: 0.3s; }
        
        .profile-menu { display: none; position: absolute; top: 65px; right: 0; background: #111; border: 2px solid red; padding: 20px; border-radius: 15px; width: 250px; text-align: left; }
        .stat-item { margin: 10px 0; font-size: 16px; color: #bbb; border-bottom: 1px solid #222; padding-bottom: 5px; }

        /* Просмотрщик картинок */
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; cursor: zoom-out; }
        .viewer img { max-width: 90%; max-height: 85%; border: 2px solid white; border-radius: 5px; box-shadow: 0 0 30px rgba(255,0,0,0.3); }

        /* Карточки галереи */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(15,15,15,0.9); border: 1px solid #333; border-radius: 15px; overflow: hidden; text-align: left; transition: 0.3s; }
        .card:hover { border-color: red; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; cursor: pointer; }
        .card-info { padding: 15px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; }

        .button { display: inline-block; background: white; border: 2px solid white; padding: 12px 30px; color: black; font-size: 20px; border-radius: 10px; cursor: pointer; text-decoration: none; }
        .button:hover:not(:disabled) { background: red; color: white; border-color: red; }
        .button:disabled { background: #333; color: #666; border-color: #333; cursor: not-allowed; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border: 2px solid red; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div class="overlay"></div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
    <img id="viewImg" src="">
</div>

<div class="auth-bar">
    <button id="mainLoginBtn" class="button" style="font-size: 14px;" onclick="openModal('authModal')">Войти</button>
    <div id="profileTrigger" style="display: none; position: relative;">
        <img id="userAvatar" class="user-avatar" onclick="toggleMenu()">
        <div id="profileMenu" class="profile-menu">
            <h3 id="menuNick" style="color: red; margin-top: 0;">Ник</h3>
            <p id="menuID" style="font-size: 12px; color: #666;">ID: 000000</p>
            <div class="stat-item">Часов: <b id="statHours">0</b></div>
            <div class="stat-item">Побед: <b id="statWins">0</b></div>
            <div class="stat-item">Кубков: <b id="statCups">0</b></div>
            <button class="button" style="font-size: 14px; width: 100%; margin-top: 10px;" onclick="logout()">Выйти</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>CubiX</h1>
    
    <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
        <div onclick="showPage('home', 'background-red.png')" style="cursor:pointer">Главная</div>
        <div onclick="showPage('gallery-page', 'background-blue.png')" style="cursor:pointer">Галерея</div>
    </div>

    <div id="home" class="page active">
        <div id="download-block"></div>
        <div id="home-gallery" class="gallery-grid"></div>
    </div>

    <div id="gallery-page" class="page">
        <div id="upload-section" style="display: none; background: rgba(20,20,20,0.8); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 40px;">
            <h3>Поделиться скриншотом</h3>
            <textarea id="userDesc" placeholder="Описание кадра..." style="width:100%; background:#111; color:white; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #444;"></textarea>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button id="uploadBtn" class="button" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
            <p id="statusMsg" style="color: #f1c40f; margin-top: 10px; font-weight: bold;"></p>
        </div>
        <div id="full-gallery" class="gallery-grid"></div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginForm">
            <h2>Вход</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="button" onclick="loginEmail()">Войти</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; font-size:14px">Регистрация</p>
        </div>
        <div id="regForm" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="regNick" placeholder="Ник">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass1" placeholder="Пароль (8+)">
            <input type="password" id="regPass2" placeholder="Повтор пароля">
            <button class="button" onclick="register()">Создать</button>
            <p onclick="toggleAuth('login')" style="cursor:pointer; font-size:14px">Назад</p>
        </div>
        <button class="button" style="background:#4285F4; color:white; width:100%; margin-top:15px;" onclick="loginGoogle()">Google</button>
        <br><br>
        <button onclick="closeModal('authModal')" style="color:#555; background:none; border:none; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    // Навигация и Модалки
    function showPage(id, bg) {
        document.getElementById('bgLayer').style.backgroundImage = `url('${bg}')`;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAuth(t) {
        document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('regForm').style.display = t === 'reg' ? 'block' : 'none';
    }
    function toggleMenu() {
        const m = document.getElementById('profileMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    // Просмотр фото
    function openFull(url) {
        document.getElementById('viewImg').src = url;
        document.getElementById('viewer').style.display = 'flex';
    }

    // Авторизация (Email/Google)
    async function loginEmail() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        auth.signInWithEmailAndPassword(email, pass).then(() => closeModal('authModal')).catch(e => alert(e.message));
    }

    async function register() {
        const nick = document.getElementById('regNick').value;
        const email = document.getElementById('regEmail').value;
        const p1 = document.getElementById('regPass1').value;
        const p2 = document.getElementById('regPass2').value;
        if(p1 !== p2 || p1.length < 8) return alert("Пароль!");
        try {
            const res = await auth.createUserWithEmailAndPassword(email, p1);
            await db.ref('users/' + res.user.uid).set({
                nick: nick, uid: res.user.uid, shortID: Math.floor(100000 + Math.random() * 900000),
                hours: 0, wins: 0, cups: 0
            });
            closeModal('authModal');
        } catch(e) { alert(e.message); }
    }

    function loginGoogle() {
        const p = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(p).then(async res => {
            const s = await db.ref('users/' + res.user.uid).once('value');
            if(!s.exists()) {
                await db.ref('users/' + res.user.uid).set({
                    nick: res.user.displayName, uid: res.user.uid, 
                    shortID: Math.floor(100000 + Math.random() * 900000),
                    hours: 0, wins: 0, cups: 0
                });
            }
            closeModal('authModal');
        });
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // Следим за состоянием
    auth.onAuthStateChanged(async user => {
        const dl = document.getElementById('download-block');
        if(user) {
            document.getElementById('mainLoginBtn').style.display = 'none';
            document.getElementById('profileTrigger').style.display = 'block';
            document.getElementById('upload-section').style.display = 'block';
            const snap = await db.ref('users/' + user.uid).once('value');
            const d = snap.val();
            document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/50/red/white?text=C';
            document.getElementById('menuNick').innerText = d.nick;
            document.getElementById('menuID').innerText = "ID: " + d.shortID;
            document.getElementById('statHours').innerText = d.hours;
            document.getElementById('statWins').innerText = d.wins;
            document.getElementById('statCups').innerText = d.cups;

            dl.innerHTML = `<a class="button" href="ССЫЛКА" target="_blank">Скачать v0.5</a>`;
        } else {
            dl.innerHTML = `<p style="color:red">Войдите для скачивания</p>`;
        }
    });

    // Галерея с метаданными
    db.ref('gallery').limitToLast(15).on('value', snap => {
        const h = document.getElementById('home-gallery');
        const f = document.getElementById('full-gallery');
        h.innerHTML = f.innerHTML = "";
        let items = [];
        snap.forEach(c => { items.unshift(c.val()); });
        items.forEach(d => {
            const date = d.time ? d.time.split(',')[0] : "Неизвестно";
            const size = (d.width && d.height) ? `${d.width}x${d.height}` : "Размер уточняется";
            const html = `
                <div class="card">
                    <img src="${d.url}" onclick="openFull('${d.url}')">
                    <div class="card-info">
                        <b>${d.author}</b><br>
                        <small>${d.desc || ""}</small>
                        <div class="card-meta">
                            <span>📅 ${date}</span>
                            <span>📐 ${size}</span>
                        </div>
                    </div>
                </div>`;
            h.innerHTML += html; f.innerHTML += html;
        });
    });

    // Загрузка с кулдауном и замером размера
    async function handleUpload() {
        const last = localStorage.getItem('lastUp') || 0;
        const now = Date.now();
        const diff = now - last;
        
        if (diff < 120000) {
            alert("Подожди еще " + Math.ceil((120000 - diff)/1000) + " сек.");
            return;
        }

        const file = document.getElementById('fileInput').files[0];
        if(!file) return;

        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('statusMsg');
        btn.disabled = true;
        status.innerText = "⏳ Обработка...";

        try {
            // Замеряем размер картинки
            const imgInfo = await new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve({w: img.width, h: img.height});
                img.src = URL.createObjectURL(file);
            });

            const ref = storage.ref('submissions/' + now + "_" + file.name);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            const uSnap = await db.ref('users/' + auth.currentUser.uid).once('value');

            await fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    photoUrl: url, 
                    author: uSnap.val().nick, 
                    desc: document.getElementById('userDesc').value,
                    time: new Date().toLocaleString(),
                    width: imgInfo.w,
                    height: imgInfo.h
                })
            });

            localStorage.setItem('lastUp', now);
            status.innerText = "✅ Отправлено!";
            
            // Запускаем визуальный таймер
            let sec = 120;
            const timer = setInterval(() => {
                sec--;
                status.innerText = `⏳ Кулдаун: ${sec}с`;
                if(sec <= 0) { clearInterval(timer); status.innerText = ""; btn.disabled = false; }
            }, 1000);

        } catch (e) {
            alert("Ошибка загрузки");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
