<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background-color: #000; color: white; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('background-red.png') center/cover; z-index: -2; transition: 0.8s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        /* Профиль */
        .auth-bar { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid red; cursor: pointer; transition: 0.3s; }
        .user-avatar:hover { transform: scale(1.1); box-shadow: 0 0 15px red; }
        
        /* Выпадающее меню профиля */
        .profile-menu { display: none; position: absolute; top: 65px; right: 0; background: #111; border: 2px solid red; padding: 20px; border-radius: 15px; width: 250px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-item { margin: 10px 0; font-size: 16px; color: #bbb; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .stat-item b { color: #f1c40f; }

        /* Модалки */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border: 2px solid red; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        h1 { font-size: clamp(60px, 12vw, 100px); text-shadow: 0 0 20px red; margin: 10px 0; }
        .main-nav { display: flex; justify-content: center; gap: 40px; margin: 30px 0; }
        .nav-btn { color: #888; text-decoration: none; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover, .active-link { color: white; text-shadow: 0 0 10px red; }

        .button { display: inline-block; background: white; border: 2px solid white; padding: 12px 30px; color: black; font-size: 22px; border-radius: 10px; transition: 0.3s; cursor: pointer; text-decoration: none; }
        .button:hover { background: red; color: white; border-color: red; }
        .dl-count { color: #f1c40f; display: block; margin-top: 10px; font-size: 14px; }

        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .page { display: none; }
        .active { display: block; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(15,15,15,0.9); border: 1px solid #333; border-radius: 15px; overflow: hidden; text-align: left; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div class="overlay"></div>

<div class="auth-bar">
    <button id="mainLoginBtn" class="button" style="font-size: 14px;" onclick="openModal('authModal')">Войти</button>
    <div id="profileTrigger" style="display: none; position: relative;">
        <img id="userAvatar" class="user-avatar" onclick="toggleMenu()">
        <div id="profileMenu" class="profile-menu">
            <h3 id="menuNick" style="color: red; margin-top: 0;">Ник</h3>
            <p id="menuID" style="font-size: 12px; color: #666; margin-bottom: 15px;">ID: 000000</p>
            <div class="stat-item">Часов в игре: <b id="statHours">0</b></div>
            <div class="stat-item">Побед: <b id="statWins">0</b></div>
            <div class="stat-item">Проигрышей: <b id="statLoss">0</b></div>
            <div class="stat-item">Кубков: <b id="statCups">0</b></div>
            <br>
            <button class="button" style="font-size: 14px; width: 100%; padding: 10px;" onclick="logout()">Выйти</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>CubiX</h1>
    
    <div class="main-nav">
        <div class="nav-btn active-link" id="link-home" onclick="showPage('home', 'background-red.png')">Главная</div>
        <div class="nav-btn" id="link-gallery" onclick="showPage('gallery-page', 'background-blue.png')">Галерея</div>
        <div class="nav-btn" id="link-versions" onclick="showPage('versions-page', 'background-yellow.png')">Версии</div>
    </div>

    <div id="home" class="page active">
        <p style="font-size: 20px; color: #ccc;">Твой портал в кубическое безумие.</p>
        
        <div id="download-block" style="margin: 40px 0;">
            </div>

        <h3>Новые кадры:</h3>
        <div id="home-gallery" class="gallery-grid"></div>
    </div>

    <div id="gallery-page" class="page">
        <div id="upload-section" style="display: none;">
            <textarea id="userDesc" placeholder="Пара слов о кадре..." style="width:100%; background:#111; color:white; padding:15px; border-radius:10px; border:1px solid #333;"></textarea>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button class="button" onclick="document.getElementById('fileInput').click()">Загрузить скриншот</button>
            <p id="statusMsg"></p>
        </div>
        <div id="full-gallery" class="gallery-grid"></div>
    </div>

    <div id="versions-page" class="page">
        <div id="versions-list">
             <p>Войдите в аккаунт, чтобы просмотреть архив версий.</p>
        </div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginForm">
            <h2>Вход</h2>
            <p id="bruteStatus" style="color: orange; font-size: 12px;"></p>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="button" id="btnSignIn" onclick="loginEmail()">Войти</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; font-size: 14px;">Нет аккаунта? <u>Регистрация</u></p>
        </div>

        <div id="regForm" style="display: none;">
            <h2>Создать аккаунт</h2>
            <input type="text" id="regNick" placeholder="Ник в игре">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass1" placeholder="Пароль (8+ символов)">
            <input type="password" id="regPass2" placeholder="Повтори пароль">
            <button class="button" onclick="register()">Регистрация</button>
            <p onclick="toggleAuth('login')" style="cursor:pointer; font-size: 14px;">Уже есть аккаунт? <u>Войти</u></p>
        </div>
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <button class="button" style="background:#4285F4; color:white; font-size:16px; width:100%;" onclick="loginGoogle()">Войти через Google</button>
        <br><br>
        <button onclick="closeModal('authModal')" style="background:none; border:none; color:#555; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    // Защита от брутфорса
    let attempts = localStorage.getItem('attempts') || 0;
    function loginEmail() {
        const ban = localStorage.getItem('banUntil');
        if (ban && Date.now() < ban) return alert("Блокировка! Подождите.");
        
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => {
            attempts++;
            localStorage.setItem('attempts', attempts);
            if(attempts >= 5) {
                localStorage.setItem('banUntil', Date.now() + 120000);
                localStorage.setItem('attempts', 0);
            }
            alert("Неверно. Попыток осталось: " + (5 - attempts));
        });
    }

    // Регистрация
    async function register() {
        const nick = document.getElementById('regNick').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const p1 = document.getElementById('regPass1').value;
        const p2 = document.getElementById('regPass2').value;

        if (p1 !== p2 || p1.length < 8) return alert("Ошибка в пароле!");
        
        try {
            const res = await auth.createUserWithEmailAndPassword(email, p1);
            const id = Math.floor(100000 + Math.random() * 900000);
            await db.ref('users/' + res.user.uid).set({
                nick: nick, uid: res.user.uid, shortID: id,
                hours: 0, wins: 0, loss: 0, cups: 0
            });
            await res.user.sendEmailVerification();
            alert("Подтвердите почту!");
            closeModal('authModal');
        } catch(e) { alert(e.message); }
    }

    function loginGoogle() {
        const p = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(p).then(async res => {
            const s = await db.ref('users/' + res.user.uid).once('value');
            if(!s.exists()) {
                await db.ref('users/' + res.user.uid).set({
                    nick: res.user.displayName, uid: res.user.uid, 
                    shortID: Math.floor(100000 + Math.random() * 900000),
                    hours: 0, wins: 0, loss: 0, cups: 0
                });
            }
            closeModal('authModal');
        });
    }

    function toggleMenu() {
        const m = document.getElementById('profileMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function logout() { auth.signOut().then(() => location.reload()); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAuth(t) {
        document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('regForm').style.display = t === 'reg' ? 'block' : 'none';
    }

    // Рендерим контент в зависимости от входа
    auth.onAuthStateChanged(async user => {
        const dlBlock = document.getElementById('download-block');
        const verList = document.getElementById('versions-list');

        if (user) {
            document.getElementById('mainLoginBtn').style.display = 'none';
            document.getElementById('profileTrigger').style.display = 'block';
            document.getElementById('upload-section').style.display = 'block';
            
            const snap = await db.ref('users/' + user.uid).once('value');
            const data = snap.val();
            
            // Наполняем меню профиля
            document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/50/red/white?text=C';
            document.getElementById('menuNick').innerText = data.nick;
            document.getElementById('menuID').innerText = "ID: " + data.shortID;
            document.getElementById('statHours').innerText = data.hours || 0;
            document.getElementById('statWins').innerText = data.wins || 0;
            document.getElementById('statLoss').innerText = data.loss || 0;
            document.getElementById('statCups').innerText = data.cups || 0;

            // Возвращаем кнопку скачать
            dlBlock.innerHTML = `
                <h2 style="color: #f1c40f;">Версия v0.5 доступна!</h2>
                <a class="button" href="ССЫЛКА_НА_ДИСК" target="_blank" onclick="countDL()">Скачать игру</a>
                <span class="dl-count" id="dl-count-text">Загрузка счетчика...</span>
            `;
            updateDLCount();

            // Возвращаем архив версий
            verList.innerHTML = `
                <div style="background:#111; padding:20px; border-left:4px solid #f1c40f; text-align:left;">
                    <h3>v0.5 (Актуальная)</h3>
                    <p>• Фикс пвп<br>• Новые шейдеры</p>
                    <a class="button" style="font-size:14px" href="ССЫЛКА">Скачать v0.5</a>
                </div>
            `;
        } else {
            dlBlock.innerHTML = `<p style="color:red">Войдите в аккаунт, чтобы получить ссылку на скачивание.</p>`;
        }
    });

    function countDL() { db.ref('downloads/v05').transaction(c => (c || 0) + 1); }
    function updateDLCount() {
        db.ref('downloads/v05').on('value', snap => {
            const el = document.getElementById('dl-count-text');
            if(el) el.innerText = (snap.val() || 0) + " скачиваний";
        });
    }

    // Галерея
    db.ref('gallery').limitToLast(12).on('value', snap => {
        const h = document.getElementById('home-gallery');
        const f = document.getElementById('full-gallery');
        h.innerHTML = f.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const html = `<div class="card"><img src="${d.url}"><div style="padding:10px"><b>${d.author}</b><br><small>${d.desc}</small></div></div>`;
            h.innerHTML = html + h.innerHTML;
            f.innerHTML = html + f.innerHTML;
        });
    });

    function showPage(id, bg) {
        document.getElementById('bgLayer').style.backgroundImage = `url('${bg}')`;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-link'));
        document.getElementById('link-' + id.replace('-page','')).classList.add('active-link');
    }

    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return;
        document.getElementById('statusMsg').innerText = "⏳ Загрузка...";
        const ref = storage.ref('submissions/' + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        const snap = await db.ref('users/' + auth.currentUser.uid).once('value');
        
        await fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ photoUrl: url, author: snap.val().nick, desc: document.getElementById('userDesc').value, time: new Date().toLocaleString() })
        });
        document.getElementById('statusMsg').innerText = "✅ Отправлено!";
    }
</script>
</body>
</html>
