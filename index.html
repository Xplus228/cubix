<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CubiX</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center/cover;
    color: white;
}

/* лёгкое затемнение */
.overlay {
    background: rgba(0,0,0,0.4);
    min-height: 100vh;
}

/* заголовок */
h1 {
    font-size: 70px;
    text-align: center;
    margin-top: 40px;
    text-shadow: 0 0 20px cyan, 0 0 40px blue;
}

/* версия */
.version {
    text-align: center;
    font-size: 20px;
    color: yellow;
}

/* кнопки */
.buttons {
    text-align: center;
    margin: 30px;
}

.btn {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    border-radius: 10px;
}

.download { background: lime; }
.versions { background: yellow; }
.login { background: cyan; }

/* цвета текста */
.blue { color: cyan; }
.yellow { color: yellow; }
.red { color: red; }

/* галерея */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* модалка */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: #222;
    padding: 20px;
    margin: 10% auto;
    width: 300px;
    border-radius: 10px;
}

input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
}

/* профиль */
.profile {
    position: absolute;
    top: 10px;
    right: 10px;
}
</style>
</head>

<body>
<div class="overlay">

<div class="profile">
    <span id="userEmail"></span>
    <button onclick="logout()">Выйти</button>
</div>

<h1>CubiX</h1>
<div class="version">Версия 0.5V</div>

<div class="buttons">
    <button class="btn download" onclick="downloadGame()">Скачать</button>
    <button class="btn versions">Версии</button>
    <button class="btn login" onclick="openModal()">Войти</button>
</div>

<div style="text-align:center;">
    Загрузок: <span id="downloads">0</span>
</div>

<p style="text-align:center;">
    <span class="blue">Крутая</span> игра с 
    <span class="yellow">атмосферой</span> и 
    <span class="red">напряжением</span>
</p>

<div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
</div>

</div>

<!-- МОДАЛКА -->
<div class="modal" id="authModal">
<div class="modal-content">
<h3>Авторизация</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">

<button onclick="login()">Войти</button>
<button onclick="register()">Регистрация</button>
<button onclick="resetPassword()">Забыл пароль</button>

</div>
</div>

<script>
// 🔥 ВСТАВЬ СВОЙ FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// открыть модалку
function openModal(){
    document.getElementById("authModal").style.display="block";
}

// регистрация
function register(){
    let email = emailInput();
    let pass = passwordInput();

    auth.createUserWithEmailAndPassword(email, pass)
    .then(()=> alert("Регистрация успешна"))
    .catch(e=>alert(e.message));
}

// вход
function login(){
    auth.signInWithEmailAndPassword(emailInput(), passwordInput())
    .then(()=> closeModal())
    .catch(e=>alert(e.message));
}

// выход
function logout(){
    auth.signOut();
}

// сброс пароля
function resetPassword(){
    auth.sendPasswordResetEmail(emailInput())
    .then(()=>alert("Письмо отправлено"));
}

// helpers
function emailInput(){ return document.getElementById("email").value; }
function passwordInput(){ return document.getElementById("password").value; }

function closeModal(){
    document.getElementById("authModal").style.display="none";
}

// статус
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("userEmail").innerText = user.email;
    } else {
        document.getElementById("userEmail").innerText = "";
    }
});

// скачивание + счётчик
function downloadGame(){
    db.collection("stats").doc("downloads").get().then(doc=>{
        let count = doc.exists ? doc.data().count : 0;
        db.collection("stats").doc("downloads").set({
            count: count + 1
        });
        document.getElementById("downloads").innerText = count+1;
    });

    alert("Тут будет скачивание");
}

// загрузка счётчика
db.collection("stats").doc("downloads").get().then(doc=>{
    if(doc.exists){
        document.getElementById("downloads").innerText = doc.data().count;
    }
});
</script>

</body>
</html>
