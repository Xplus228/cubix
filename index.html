<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CubiX</title>

<style>
@font-face {
    font-family: Door;
    src: url('door.otf');
}

body {
    margin: 0;
    font-family: Door, Arial;
    background: url('background-red.png');
    background-size: cover;
    color: white;
}

/* затемнение */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* HERO */
.hero {
    padding: 120px 20px;
    text-align: center;
}

h1 {
    font-size: 80px;
    color: #ff2e2e;
}

/* КНОПКА */
.button {
    border: 2px solid white;
    padding: 15px 30px;
    color: white;
    text-decoration: none;
    font-size: 20px;
    border-radius: 12px;
    transition: 0.3s;
}

.button:hover {
    background: white;
    color: black;
}

/* СЕКЦИИ */
.section {
    padding: 60px;
    text-align: center;
}

/* ВЕРСИИ */
.version {
    margin: 20px auto;
    padding: 20px;
    background: rgba(0,0,0,0.7);
    border-left: 5px solid red;
    max-width: 600px;
}

/* ГАЛЕРЕЯ */
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* FULLSCREEN */
.fullscreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.fullscreen img {
    max-width: 90%;
    max-height: 80%;
}

.fullscreen p {
    color: white;
}
</style>
</head>

<body>

<div class="hero">
    <h1>CubiX</h1>
    <a class="button" href="#">Играть</a>
</div>

<div class="section">
    <h2>Скриншоты</h2>
    <div class="gallery">
        <img src="cube.png" onclick="openImg(this)">
        <img src="cover.png" onclick="openImg(this)">
    </div>
</div>

<div class="section">
    <h2>Версии</h2>

    <div class="version">
        <h3>v1.0</h3>
        <p>Первая версия игры</p>
        <a class="button" href="#">Скачать</a>
    </div>

</div>

<!-- FULLSCREEN VIEW -->
<div class="fullscreen" id="viewer" onclick="closeImg()">
    <img id="bigImg">
    <p id="imgInfo"></p>
</div>

<script>
function openImg(el) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("bigImg").src = el.src;
    document.getElementById("imgInfo").innerText = el.src;
}

function closeImg() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
