<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CubiX | Portal</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
@font-face { font-family: Door; src: url('door.otf'); }
* { font-family: Door, Arial; box-sizing: border-box; }

body { margin:0; background:#000; color:#fff; overflow-x:hidden; }

.bg-layer {
position:fixed; width:100%; height:100%;
background-size:cover; background-position:center;
z-index:-2; transition:.5s;
}

.overlay {
position:fixed; width:100%; height:100%;
background:rgba(0,0,0,0.85); z-index:-1;
}

.container {
max-width:1100px; margin:auto; padding:40px; text-align:center;
}

h1 {
font-size:clamp(60px,12vw,100px);
text-shadow:0 0 20px red;
}

.main-nav {
display:flex; justify-content:center; gap:40px; margin:40px 0;
}

.nav-btn {
color:#888; cursor:pointer;
border-bottom:2px solid transparent;
}

.nav-btn:hover,.active-link {
color:#fff; border-color:red;
}

.button {
background:#fff; color:#000;
padding:15px 40px;
border-radius:10px;
cursor:pointer;
display:inline-block;
margin:10px;
}

.button:hover {
background:red; color:#fff;
}

.gallery-grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card {
background:#111; border-radius:10px; overflow:hidden;
}

.card img {
width:100%; aspect-ratio:16/9; object-fit:cover;
cursor:pointer;
}

.modal {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content {
background:#000;
border:2px solid red;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
}

input, textarea {
width:100%;
margin:10px 0;
padding:10px;
background:#111;
color:#fff;
border:1px solid #333;
}

.page { display:none; }
.active { display:block; }

.viewer {
display:none;
position:fixed;
width:100%; height:100%;
background:#000;
justify-content:center;
align-items:center;
}

.viewer img {
max-width:90%;
}
</style>
</head>

<body>

<div class="bg-layer" id="bgLayer" style="background-image:url('background-red.png')"></div>
<div class="overlay"></div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
<img id="viewImg">
</div>

<div class="container">
<h1>CubiX</h1>

<div class="main-nav">
<div class="nav-btn active-link" onclick="showPage('home','background-red.png')">Главная</div>
<div class="nav-btn" onclick="showPage('gallery','background-blue.png')">Галерея</div>
</div>

<div id="home" class="page active">
<p>Добро пожаловать в мир кубов.</p>

<button class="button" onclick="downloadGame()">СКАЧАТЬ</button>

<h3>Топ-5</h3>
<div id="home-gallery" class="gallery-grid"></div>
</div>

<div id="gallery" class="page">
<h2>Галерея</h2>

<div class="gallery-grid" id="full-gallery"></div>

<h3>Загрузить</h3>
<textarea id="desc" placeholder="Описание"></textarea>
<input type="file" id="file" onchange="upload()">
</div>
</div>

<!-- AUTH -->
<div id="authModal" class="modal">
<div class="modal-content">
<h2>Вход</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Пароль">

<button class="button" onclick="login()">Войти</button>
<button class="button" onclick="google()">Google</button>

</div>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
authDomain:"cubix-web.firebaseapp.com",
databaseURL:"https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"cubix-web",
storageBucket:"cubix-web.firebasestorage.app"
});

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

// UX
document.body.onclick = () => {
const m = document.getElementById('music');
if(m.paused) m.play().catch(()=>{});
};

function showPage(id,bg){
document.getElementById('bgLayer').style.backgroundImage=`url(${bg})`;
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// AUTH
function requireAuth(){
if(!auth.currentUser){
document.getElementById('authModal').style.display='flex';
return false;
}
return true;
}

function login(){
auth.signInWithEmailAndPassword(email.value,pass.value)
.then(()=>authModal.style.display='none')
.catch(e=>alert(e.message));
}

function google(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// DOWNLOAD
function downloadGame(){
if(!requireAuth()) return;
window.open("https://drive.google.com/file/d/13sFn3THSF_5-CxYdcR2fd0udfEVBN7rn/view","_blank");
}

// GALLERY
db.ref('gallery').on('value',snap=>{
const h=document.getElementById('home-gallery');
const f=document.getElementById('full-gallery');
h.innerHTML=""; f.innerHTML="";

let arr=[];
snap.forEach(c=>arr.unshift(c.val()));

arr.forEach((d,i)=>{
const html=`<div class="card">
<img src="${d.url}" onclick="view('${d.url}')">
</div>`;
if(i<5) h.innerHTML+=html;
f.innerHTML+=html;
});
});

function view(u){
viewer.style.display='flex';
viewImg.src=u;
}

// UPLOAD
async function upload(){
if(!requireAuth()) return;

const file=document.getElementById('file').files[0];
if(!file) return;

const ref=storage.ref('img/'+Date.now());
await ref.put(file);
const url=await ref.getDownloadURL();

await db.ref('gallery').push({url});
}

</script>

</body>
</html>
