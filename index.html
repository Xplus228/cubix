<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background-color: #000; color: white; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('background-red.png') center/cover; z-index: -2; transition: 0.8s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        /* КРУТОЙ СВЕТЯЩИЙСЯ ЗАГОЛОВОК */
        h1 { 
            font-size: clamp(80px, 15vw, 120px); 
            margin: 20px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #8b0000;
            }
            to {
                text-shadow: 0 0 20px #ff4d4d, 0 0 30px #ff4d4d, 0 0 50px #ff0000, 0 0 70px #ff0000;
                transform: scale(1.02);
            }
        }

        /* Навигация */
        .main-nav { display: flex; justify-content: center; gap: 40px; margin: 40px 0; }
        .nav-link { font-size: 24px; color: #666; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-link:hover, .nav-link.active { color: #fff; border-color: red; text-shadow: 0 0 10px red; }

        /* Профиль */
        .auth-bar { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid red; cursor: pointer; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .profile-menu { display: none; position: absolute; top: 70px; right: 0; background: #0a0a0a; border: 2px solid red; padding: 20px; border-radius: 15px; width: 260px; text-align: left; }
        .stat-item { margin: 8px 0; color: #888; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .stat-item b { color: #ff4d4d; }

        /* Версии */
        .version-card { background: rgba(255,255,255,0.03); border: 1px solid #333; border-left: 5px solid #f1c40f; padding: 30px; border-radius: 0 15px 15px 0; text-align: left; margin-bottom: 20px; }
        .dl-badge { color: #f1c40f; font-weight: bold; font-size: 14px; display: block; margin-top: 10px; }

        /* Галерея и Просмотр */
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; justify-content: center; align-items: center; }
        .viewer img { max-width: 95%; max-height: 90%; border: 2px solid #fff; box-shadow: 0 0 50px red; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: red; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; cursor: pointer; }

        .button { background: #fff; color: #000; padding: 14px 35px; border-radius: 8px; font-size: 22px; cursor: pointer; border: none; transition: 0.3s; text-decoration: none; display: inline-block; }
        .button:hover:not(:disabled) { background: red; color: #fff; transform: scale(1.05); }
        .button:disabled { background: #222; color: #444; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #000; border: 2px solid red; padding: 30px; border-radius: 20px; width: 380px; text-align: center; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 5px; }
        
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div class="overlay"></div>

<div class="viewer" id="viewer" onclick="this.style.display='none'"><img id="viewImg"></div>

<div class="auth-bar">
    <button id="mainLoginBtn" class="button" style="font-size: 14px;" onclick="openModal('authModal')">ВОЙТИ</button>
    <div id="profileTrigger" style="display: none;">
        <img id="userAvatar" class="user-avatar" onclick="toggleMenu()">
        <div id="profileMenu" class="profile-menu">
            <h3 id="menuNick" style="margin:0; color:red;">NICKNAME</h3>
            <p id="menuID" style="font-size:12px; color:#555; margin-bottom:15px;">ID: 000000</p>
            <div class="stat-item">Часов: <b id="statHours">0</b></div>
            <div class="stat-item">Побед: <b id="statWins">0</b></div>
            <div class="stat-item">Кубков: <b id="statCups">0</b></div>
            <button class="button" style="width:100%; font-size:14px; margin-top:15px;" onclick="logout()">ВЫЙТИ</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>CubiX</h1>
    
    <div class="main-nav">
        <div class="nav-link active" id="btn-home" onclick="showPage('home', 'background-red.png')">Главная</div>
        <div class="nav-link" id="btn-gallery" onclick="showPage('gallery-page', 'background-blue.png')">Галерея</div>
        <div class="nav-link" id="btn-versions" onclick="showPage('versions-page', 'background-yellow.png')">Версии</div>
    </div>

    <div id="home" class="page active">
        <div id="dl-section-home" style="margin-bottom: 50px;">
            <p style="color:red">Доступ к загрузке только для авторизованных пользователей.</p>
        </div>
        <h3 style="text-align:left; border-left: 3px solid red; padding-left: 15px;">ПОСЛЕДНИЕ КАДРЫ</h3>
        <div id="home-gallery" class="gallery-grid"></div>
    </div>

    <div id="gallery-page" class="page">
        <div id="upload-box" style="display:none; background:rgba(20,20,20,0.8); padding:25px; border-radius:15px; margin-bottom:40px; border:1px solid #222;">
            <textarea id="userDesc" placeholder="Описание кадра..." style="width:100%; height:80px; background:#000; color:#fff; padding:10px; border:1px solid #333; margin-bottom:10px;"></textarea>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button id="uploadBtn" class="button" onclick="document.getElementById('fileInput').click()">ЗАГРУЗИТЬ СКРИНШОТ</button>
            <p id="statusMsg" style="color:#f1c40f; margin-top:10px;"></p>
        </div>
        <div id="full-gallery" class="gallery-grid"></div>
    </div>

    <div id="versions-page" class="page">
        <h2>АРХИВ ВЕРСИЙ</h2>
        <div id="versions-content">
            <p style="color:#555">Войдите, чтобы просмотреть список доступных версий.</p>
        </div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginForm">
            <h2>ВХОД</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="button" style="width:100%" onclick="loginEmail()">ВОЙТИ</button>
            <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth('reg')">НЕТ АККАУНТА? РЕГИСТРАЦИЯ</p>
        </div>
        <div id="regForm" style="display:none">
            <h2>РЕГИСТРАЦИЯ</h2>
            <input type="text" id="regNick" placeholder="Игровой Ник">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass1" placeholder="Пароль (8+ символов)">
            <input type="password" id="regPass2" placeholder="Повторите пароль">
            <button class="button" style="width:100%" onclick="register()">СОЗДАТЬ</button>
            <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth('login')">УЖЕ ЕСТЬ АККАУНТ?</p>
        </div>
        <button class="button" style="width:100%; background:#4285F4; color:#fff; margin-top:10px;" onclick="loginGoogle()">GOOGLE</button>
        <button onclick="closeModal('authModal')" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    // Переключение страниц
    function showPage(id, bg) {
        document.getElementById('bgLayer').style.backgroundImage = `url('${bg}')`;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + (id === 'home' ? 'home' : id.split('-')[0])).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAuth(t) {
        document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('regForm').style.display = t === 'reg' ? 'block' : 'none';
    }
    function toggleMenu() {
        const m = document.getElementById('profileMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    // ЛОГИКА АВТОРИЗАЦИИ
    async function loginEmail() {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        auth.signInWithEmailAndPassword(e, p).then(() => closeModal('authModal')).catch(err => alert(err.message));
    }

    async function register() {
        const n = document.getElementById('regNick').value.trim();
        const e = document.getElementById('regEmail').value.trim();
        const p1 = document.getElementById('regPass1').value;
        if(p1.length < 8) return alert("Пароль от 8 символов!");
        
        try {
            const res = await auth.createUserWithEmailAndPassword(e, p1);
            await db.ref('users/' + res.user.uid).set({
                nick: n, uid: res.user.uid, shortID: Math.floor(100000 + Math.random()*900000),
                hours: 0, wins: 0, cups: 0
            });
            closeModal('authModal');
        } catch(err) { alert(err.message); }
    }

    function loginGoogle() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(async res => {
            const s = await db.ref('users/' + res.user.uid).once('value');
            if(!s.exists()){
                await db.ref('users/' + res.user.uid).set({
                    nick: res.user.displayName, uid: res.user.uid, shortID: Math.floor(100000 + Math.random()*900000),
                    hours: 0, wins: 0, cups: 0
                });
            }
            closeModal('authModal');
        });
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПРИ ВХОДЕ
    auth.onAuthStateChanged(async user => {
        const dlHome = document.getElementById('dl-section-home');
        const verContent = document.getElementById('versions-content');

        if(user) {
            document.getElementById('mainLoginBtn').style.display = 'none';
            document.getElementById('profileTrigger').style.display = 'block';
            document.getElementById('upload-box').style.display = 'block';
            
            const snap = await db.ref('users/' + user.uid).once('value');
            const d = snap.val();
            document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/60/red/white?text=C';
            document.getElementById('menuNick').innerText = d.nick;
            document.getElementById('menuID').innerText = "ID: " + d.shortID;
            document.getElementById('statHours').innerText = d.hours || 0;
            document.getElementById('statWins').innerText = d.wins || 0;
            document.getElementById('statCups').innerText = d.cups || 0;

            // Кнопка на главной
            dlHome.innerHTML = `
                <h2 style="color:#f1c40f">ДОСТУПНА v0.5</h2>
                <a class="button" href="ССЫЛКА_НА_ФАЙЛ" onclick="countDL()" target="_blank">СКАЧАТЬ ИГРУ</a>
                <span class="dl-badge" id="dl-cnt-1">Загрузка...</span>
            `;

            // Список в версиях
            verContent.innerHTML = `
                <div class="version-card">
                    <h3 style="color:#f1c40f; margin:0;">v0.5 (LATEST)</h3>
                    <p>• Полностью переработан интерфейс сайта.<br>• Исправлена система отправки в Telegram.<br>• Добавлена авторизация и личный кабинет.</p>
                    <a class="button" style="font-size:16px;" href="ССЫЛКА" onclick="countDL()" target="_blank">СКАЧАТЬ v0.5</a>
                    <span class="dl-badge" id="dl-cnt-2">Загрузка...</span>
                </div>
            `;
            syncDL();
        }
    });

    function countDL() { db.ref('stats/v05_downloads').transaction(c => (c || 0) + 1); }
    function syncDL() {
        db.ref('stats/v05_downloads').on('value', s => {
            const val = s.val() || 0;
            if(document.getElementById('dl-cnt-1')) document.getElementById('dl-cnt-1').innerText = "СКАЧАНО: " + val;
            if(document.getElementById('dl-cnt-2')) document.getElementById('dl-cnt-2').innerText = "СКАЧАНО: " + val;
        });
    }

    // ГАЛЕРЕЯ
    db.ref('gallery').limitToLast(12).on('value', snap => {
        const h = document.getElementById('home-gallery');
        const f = document.getElementById('full-gallery');
        h.innerHTML = f.innerHTML = "";
        let items = [];
        snap.forEach(c => items.unshift(c.val()));
        items.forEach(d => {
            const html = `
                <div class="card">
                    <img src="${d.url}" onclick="openFull('${d.url}')">
                    <div style="padding:15px">
                        <b>${d.author}</b><br><small style="color:#666">${d.desc || ""}</small>
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#333; margin-top:10px; border-top:1px solid #1a1a1a; padding-top:5px;">
                            <span>${d.time ? d.time.split(',')[0] : ""}</span>
                            <span>${d.width}x${d.height}</span>
                        </div>
                    </div>
                </div>`;
            h.innerHTML += html; f.innerHTML += html;
        });
    });

    function openFull(u) { document.getElementById('viewImg').src=u; document.getElementById('viewer').style.display='flex'; }

    async function handleUpload() {
        const last = localStorage.getItem('lastUp') || 0;
        if (Date.now() - last < 120000) return alert("Кулдаун 2 минуты!");

        const file = document.getElementById('fileInput').files[0];
        if(!file) return;

        const status = document.getElementById('statusMsg');
        status.innerText = "⏳ Загрузка...";
        
        const imgInfo = await new Promise(r => {
            const i = new Image();
            i.onload = () => r({w:i.width, h:i.height});
            i.src = URL.createObjectURL(file);
        });

        const ref = storage.ref('submissions/' + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        const uSnap = await db.ref('users/' + auth.currentUser.uid).once('value');

        await fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                photoUrl: url, author: uSnap.val().nick, 
                desc: document.getElementById('userDesc').value,
                time: new Date().toLocaleString(),
                width: imgInfo.w, height: imgInfo.h
            })
        });

        localStorage.setItem('lastUp', Date.now());
        status.innerText = "✅ Отправлено!";
        setTimeout(() => status.innerText = "", 3000);
    }
</script>
</body>
</html>
