<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background-color: #000; color: white; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -2; transition: 0.8s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        h1 { font-size: clamp(60px, 12vw, 100px); text-shadow: 0 0 20px red; margin: 10px 0; }
        .main-nav { display: flex; justify-content: center; gap: 45px; margin: 40px 0; flex-wrap: wrap; }
        .nav-btn { color: #888; text-decoration: none; font-size: 24px; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-btn:hover, .nav-btn.active-link { color: white; border-color: red; text-shadow: 0 0 10px white; }
        
        .button { display: inline-block; background: white; border: 2px solid white; padding: 15px 40px; color: black; text-decoration: none; font-size: 22px; border-radius: 10px; transition: 0.3s; cursor: pointer; margin: 10px 0; }
        .button:hover:not(:disabled) { background: red; border-color: red; color: white; transform: scale(1.05); }
        .button:disabled { background: #333; border-color: #333; color: #666; cursor: not-allowed; }
        
        /* Галерея */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(15,15,15,0.9); border: 1px solid #333; border-radius: 15px; overflow: hidden; transition: 0.3s; text-align: left; }
        .card:hover { border-color: red; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; cursor: pointer; }
        .card-info { padding: 15px; }
        .card-author { color: #3498db; font-size: 18px; font-weight: bold; }
        .card-desc { color: #ccc; font-size: 14px; margin: 5px 0; min-height: 1.2em; }
        .card-meta { display: flex; justify-content: space-between; color: #555; font-size: 11px; border-top: 1px solid #222; padding-top: 8px; margin-top: 5px; }
        
        input, textarea { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; max-width: 450px; margin-bottom: 12px; }
        .auth-container { max-width: 400px; margin: 0 auto; background: rgba(20,20,20,0.9); padding: 30px; border-radius: 20px; border: 1px solid red; }
        .auth-switch { font-size: 14px; color: #888; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
        
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .viewer img { max-width: 90%; max-height: 80%; border: 2px solid white; }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer" style="background-image: url('background-red.png');"></div>
<div class="overlay"></div>

<div class="container">
    <h1>CubiX</h1>
    
    <div class="main-nav">
        <div class="nav-btn active-link" id="link-home" onclick="showPage('home', 'background-red.png')">Главная</div>
        <div class="nav-btn" id="link-gallery" onclick="showPage('gallery-page', 'background-blue.png')">Галерея</div>
        <div class="nav-btn" id="link-versions" onclick="showPage('versions-page', 'background-yellow.png')">Версии</div>
        <div class="nav-btn" id="link-profile" onclick="showPage('profile-page', 'background-red.png')">Профиль</div>
    </div>

    <div id="home" class="page active">
        <p style="font-size: 20px; color: #bbb;">Последние кадры сообщества:</p>
        <div id="home-gallery" class="gallery-grid"></div>
    </div>

    <div id="gallery-page" class="page">
        <div id="full-gallery" class="gallery-grid"></div>
        <div style="margin-top: 50px; background: rgba(20,20,20,0.8); padding: 30px; border-radius: 20px; border: 1px solid #333;">
            <h3>Поделиться скриншотом</h3>
            <input type="text" id="userNick" placeholder="Твой ник" readonly>
            <textarea id="userDesc" placeholder="Напиши что-нибудь о кадре..."></textarea>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button id="uploadBtn" class="button" onclick="checkAuthAndTriggerUpload()">Выбрать файл</button>
            <p id="statusMsg" style="margin-top: 10px; color: #f1c40f;"></p>
        </div>
    </div>

    <div id="versions-page" class="page">
        <h2>Архив Версий</h2>
        <a class="button" href="ССЫЛКА" target="_blank">Скачать v0.5</a>
    </div>

    <div id="profile-page" class="page">
        <div id="auth-forms" class="auth-container">
            <div id="login-form">
                <h2>Вход</h2>
                <input type="email" id="authEmail" placeholder="Email">
                <input type="password" id="authPass" placeholder="Пароль">
                <button class="button" style="width:100%" onclick="login()">Войти</button>
                <button class="button" style="background:#4285F4; color:white; width:100%; font-size: 16px;" onclick="loginGoogle()">Google</button>
                <span class="auth-switch" onclick="switchAuth('reg')">Нет аккаунта? Регистрация</span>
            </div>

            <div id="reg-form" style="display:none;">
                <h2>Регистрация</h2>
                <input type="text" id="regNick" placeholder="Ник в игре">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPass" placeholder="Пароль">
                <button class="button" style="width:100%" onclick="register()">Создать</button>
                <span class="auth-switch" onclick="switchAuth('login')">Назад</span>
            </div>

            <div id="google-finish-form" style="display:none;">
                <h2 style="color: #f1c40f;">Почти готово!</h2>
                <p>Придумай ник и пароль для аккаунта:</p>
                <input type="text" id="gNick" placeholder="Твой ник">
                <input type="password" id="gPass" placeholder="Новый пароль">
                <button class="button" style="width:100%" onclick="finishGoogleReg()">Завершить</button>
            </div>
        </div>

        <div id="profile-data" style="display:none;">
            <div class="auth-container" style="border-color: #f1c40f;">
                <h2 id="dispNick">Ник</h2>
                <p id="dispEmail" style="color: #888;"></p>
                <p>Статус: <span id="dispRole" style="color:red">Игрок</span></p>
                <button class="button" style="font-size: 16px; background:#222; color:white;" onclick="logout()">Выйти</button>
                <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
                    <button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteAccount()">Удалить аккаунт</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="viewer" id="viewer" onclick="this.style.display='none'"><img id="viewImg"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const auth = firebase.auth();

    // --- ЛОГИКА СТРАНИЦ ---
    function showPage(id, bg) {
        document.getElementById('bgLayer').style.backgroundImage = `url('${bg}')`;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- AUTH ЛОГИКА ---
    function switchAuth(t) {
        document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('reg-form').style.display = t === 'reg' ? 'block' : 'none';
        document.getElementById('google-finish-form').style.display = 'none';
    }

    async function register() {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const nick = document.getElementById('regNick').value.trim();
        if(!nick || !email || pass.length < 6) return alert("Заполни данные (пароль от 6 знаков)!");
        try {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + res.user.uid).set({
                nick: nick, email: email,
                permissions: { role: 'player', isBannedSite: false }
            });
        } catch(e) { alert(e.message); }
    }

    async function login() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { alert(e.message); }
    }

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    async function finishGoogleReg() {
        const user = auth.currentUser;
        const nick = document.getElementById('gNick').value.trim();
        const pass = document.getElementById('gPass').value;
        if(!nick || pass.length < 6) return alert("Введите ник и пароль (мин. 6 символов)!");

        try {
            // Устанавливаем пароль для Google-аккаунта (теперь можно войти и так, и так)
            await user.updatePassword(pass);
            // Сохраняем в базу
            await db.ref('users/' + user.uid).set({
                nick: nick, email: user.email,
                permissions: { role: 'player', isBannedSite: false }
            });
            location.reload(); 
        } catch(e) { alert("Ошибка: " + e.message); }
    }

    function logout() { auth.signOut(); }

    async function deleteAccount() {
        const user = auth.currentUser;
        if (confirm("Удалить аккаунт навсегда?") && confirm("Точно?")) {
            await db.ref('users/' + user.uid).remove();
            await user.delete().catch(() => alert("Нужно перевойти в аккаунт перед удалением"));
        }
    }

    // Слежка за юзером
    auth.onAuthStateChanged(async user => {
        const profileData = document.getElementById('profile-data');
        const authForms = document.getElementById('auth-forms');
        const finishForm = document.getElementById('google-finish-form');
        
        if(user) {
            const snap = await db.ref('users/' + user.uid).once('value');
            if (!snap.exists()) {
                // Если юзер вошел через Google, но его нет в базе данных
                authForms.style.display = 'block';
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('reg-form').style.display = 'none';
                finishForm.style.display = 'block';
            } else {
                // Юзер полностью зарегистрирован
                authForms.style.display = 'none';
                profileData.style.display = 'block';
                const d = snap.val();
                document.getElementById('dispNick').innerText = d.nick;
                document.getElementById('dispEmail').innerText = user.email;
                document.getElementById('userNick').value = d.nick;
            }
        } else {
            authForms.style.display = 'block';
            profileData.style.display = 'none';
            finishForm.style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }
    });

    // --- ГАЛЕРЕЯ (ИСПРАВЛЕНА) ---
    db.ref('gallery').on('value', snap => {
        const h = document.getElementById('home-gallery');
        const f = document.getElementById('full-gallery');
        if(!h || !f) return;
        
        h.innerHTML = ""; 
        f.innerHTML = "";
        
        let all = [];
        snap.forEach(child => { 
            let data = child.val();
            all.unshift(data); // Добавляем новые в начало
        });

        all.forEach((d, i) => {
            const date = d.time ? d.time.split(',')[0] : "---";
            const meta = (d.width && d.height) ? `${d.width}x${d.height}` : "";
            
            // Собираем карточку со ВСЕМИ данными
            const cardHtml = `
                <div class="card">
                    <img src="${d.url}" onclick="openFull('${d.url}')">
                    <div class="card-info">
                        <div class="card-author">${d.author}</div>
                        <div class="card-desc">${d.desc || ""}</div>
                        <div class="card-meta">
                            <span>📅 ${date}</span>
                            <span>📐 ${meta}</span>
                        </div>
                    </div>
                </div>`;
            
            if(i < 5) h.innerHTML += cardHtml; // В топ-5 на главную
            f.innerHTML += cardHtml; // Все в общую галерею
        });
    });

    // --- ЗАГРУЗКА ---
    function checkAuthAndTriggerUpload() {
        if(!auth.currentUser) { showPage('profile-page', 'background-red.png'); return; }
        document.getElementById('fileInput').click();
    }

    async function handleUpload() {
        const user = auth.currentUser;
        const now = Date.now();
        const last = localStorage.getItem('lastUp') || 0;
        if (now - last < 120000) { alert("Подожди 2 минуты!"); return; }

        const file = document.getElementById('fileInput').files[0];
        if(!file) return;

        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('uploadBtn');
        status.innerText = "⏳ Загрузка...";
        btn.disabled = true;

        try {
            const imgInfo = await new Promise(res => {
                const i = new Image();
                i.onload = () => res({w: i.width, h: i.height});
                i.src = URL.createObjectURL(file);
            });

            const ref = storage.ref('submissions/' + now + "_" + file.name);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            // Запись в базу (для твоих правил .write)
            await db.ref('moderation').push({
                url, author: document.getElementById('userNick').value,
                desc: document.getElementById('userDesc').value,
                width: imgInfo.w, height: imgInfo.h,
                time: new Date().toLocaleString(), uid: user.uid
            });

            // В телеграм (Cloud Function)
            fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    photoUrl: url, 
                    author: document.getElementById('userNick').value, 
                    desc: document.getElementById('userDesc').value,
                    width: imgInfo.w, height: imgInfo.h
                })
            });

            localStorage.setItem('lastUp', now);
            status.innerText = "✅ Успешно отправлено!";
            btn.disabled = false;
        } catch (e) { 
            status.innerText = "❌ Ошибка загрузки."; 
            btn.disabled = false; 
        }
    }

    function openFull(u) { document.getElementById('viewer').style.display='flex'; document.getElementById('viewImg').src=u; }
</script>
</body>
</html>
