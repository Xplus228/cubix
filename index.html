<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubiX | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @font-face { font-family: Door; src: url('door.otf'); }
        * { font-family: Door, Arial, sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background-color: #000; color: white; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('background-red.png') center/cover; z-index: -2; transition: 0.8s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        /* Профиль в углу */
        .auth-bar { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid red; cursor: pointer; }
        
        /* Модальное окно */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border: 2px solid red; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        
        h1 { font-size: clamp(60px, 12vw, 100px); text-shadow: 0 0 20px red; margin: 10px 0; }
        .button { display: inline-block; background: white; border: 2px solid white; padding: 12px 30px; color: black; font-size: 20px; border-radius: 10px; transition: 0.3s; cursor: pointer; margin: 5px; }
        .button:hover:not(:disabled) { background: red; color: white; }
        
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .error-msg { color: #ff4d4d; font-size: 14px; margin-bottom: 10px; min-height: 1.2em; }
        
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(15,15,15,0.9); border: 1px solid #333; border-radius: 15px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div class="overlay"></div>

<div class="auth-bar">
    <div id="userInfo" style="display: none; text-align: right;">
        <span id="displayNick" style="color: red;"></span><br>
        <small id="displayID" style="color: #555;"></small>
    </div>
    <img id="userAvatar" class="user-avatar" style="display: none;" onclick="logout()">
    <button id="mainLoginBtn" class="button" style="font-size: 14px;" onclick="openModal()">Войти / Регистрация</button>
</div>

<div class="container">
    <h1>CubiX</h1>
    
    <div class="main-nav" style="display: flex; justify-content: center; gap: 30px; margin: 30px;">
        <div onclick="showPage('home', 'background-red.png')" style="cursor:pointer">Главная</div>
        <div onclick="showPage('gallery-page', 'background-blue.png')" style="cursor:pointer">Галерея</div>
    </div>

    <div id="home" class="page active">
        <p>Добро пожаловать в CubiX Portal</p>
        <div id="home-gallery" class="gallery-grid"></div>
    </div>

    <div id="gallery-page" class="page">
        <div id="upload-section" style="display: none; background: rgba(20,20,20,0.8); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px;">
            <textarea id="userDesc" placeholder="Описание кадра..." style="width:100%; background:#111; color:white; padding:10px;"></textarea>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload()">
            <button class="button" onclick="document.getElementById('fileInput').click()">Отправить скриншот</button>
            <p id="statusMsg" style="color: #f1c40f;"></p>
        </div>
        <div id="full-gallery" class="gallery-grid"></div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginForm">
            <h2>Вход</h2>
            <p id="bruteStatus" style="font-size: 12px; color: orange;"></p>
            <input type="email" id="loginEmail" placeholder="Почта">
            <input type="password" id="loginPass" placeholder="Пароль">
            <div id="loginError" class="error-msg"></div>
            <button id="btnSignIn" class="button" onclick="loginEmail()">Войти</button>
            <hr>
            <button class="button" style="font-size: 14px;" onclick="toggleAuth('reg')">Нет аккаунта? Регистрация</button>
        </div>

        <div id="regForm" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="regNick" placeholder="Игровой Ник">
            <input type="email" id="regEmail" placeholder="Электронная почта">
            <input type="password" id="regPass1" placeholder="Пароль (мин. 8 симв.)">
            <input type="password" id="regPass2" placeholder="Повторите пароль">
            <div id="regError" class="error-msg"></div>
            <button class="button" onclick="register()">Создать аккаунт</button>
            <hr>
            <button class="button" style="font-size: 14px;" onclick="toggleAuth('login')">Уже есть аккаунт?</button>
        </div>
        
        <button class="button" style="background: #4285F4; color: white; width: 100%;" onclick="loginGoogle()">Войти через Google</button>
        <br><br>
        <button onclick="closeModal()" style="background:none; border:none; color:white; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA7XdMGOwDx_OQ8lGHyz0ttw5952KZHM8",
        authDomain: "cubix-web.firebaseapp.com",
        databaseURL: "https://cubix-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cubix-web",
        storageBucket: "cubix-web.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    // Брутфорс защита (Локальная)
    let loginAttempts = localStorage.getItem('loginAttempts') || 0;
    let banTime = localStorage.getItem('banUntil') || 0;

    function checkBan() {
        const now = Date.now();
        if (now < banTime) {
            const left = Math.ceil((banTime - now) / 1000);
            document.getElementById('bruteStatus').innerText = `Бан на ${left} сек. Попыток: 0`;
            document.getElementById('btnSignIn').disabled = true;
            return true;
        }
        document.getElementById('btnSignIn').disabled = false;
        document.getElementById('bruteStatus').innerText = loginAttempts > 0 ? `Осталось попыток: ${5 - loginAttempts}` : "";
        return false;
    }
    setInterval(checkBan, 1000);

    // Функции модалки
    function openModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('authModal').style.display = 'none'; }
    function toggleAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('regForm').style.display = type === 'reg' ? 'block' : 'none';
    }

    // Регистрация
    async function register() {
        const nick = document.getElementById('regNick').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const p1 = document.getElementById('regPass1').value;
        const p2 = document.getElementById('regPass2').value;
        const err = document.getElementById('regError');

        if (nick.length < 3) return err.innerText = "Ник слишком короткий";
        if (p1 !== p2) return err.innerText = "Пароли не совпадают";
        if (p1.length < 8) return err.innerText = "Пароль должен быть от 8 символов";

        try {
            const cred = await auth.createUserWithEmailAndPassword(email, p1);
            const shortID = Math.floor(100000 + Math.random() * 900000); // Генерим ID 6 знаков
            
            await cred.user.updateProfile({ displayName: nick });
            await db.ref('users/' + cred.user.uid).set({ 
                nick: nick, 
                email: email, 
                uid: cred.user.uid, 
                shortID: shortID 
            });
            
            await cred.user.sendEmailVerification();
            alert("Письмо подтверждения отправлено! Проверь почту.");
            closeModal();
        } catch (e) { err.innerText = e.message; }
    }

    // Вход по почте
    async function loginEmail() {
        if (checkBan()) return;
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const err = document.getElementById('loginError');

        try {
            await auth.signInWithEmailAndPassword(email, pass);
            localStorage.setItem('loginAttempts', 0);
            closeModal();
        } catch (e) {
            loginAttempts++;
            localStorage.setItem('loginAttempts', loginAttempts);
            if (loginAttempts >= 5) {
                const untill = Date.now() + 120000;
                localStorage.setItem('banUntil', untill);
                localStorage.setItem('loginAttempts', 0);
            }
            err.innerText = "Неверные данные.";
        }
    }

    // Вход Google
    async function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const res = await auth.signInWithPopup(provider);
            const userRef = db.ref('users/' + res.user.uid);
            const snap = await userRef.once('value');
            
            if (!snap.exists()) {
                // Если новый юзер через Гугл - просим ник (упрощенно ставим имя из гугла)
                const shortID = Math.floor(100000 + Math.random() * 900000);
                await userRef.set({ 
                    nick: res.user.displayName, 
                    email: res.user.email, 
                    uid: res.user.uid, 
                    shortID: shortID 
                });
            }
            closeModal();
        } catch (e) { alert(e.message); }
    }

    function logout() { auth.signOut(); location.reload(); }

    // Следим за юзером
    auth.onAuthStateChanged(async user => {
        if (user) {
            document.getElementById('mainLoginBtn').style.display = 'none';
            document.getElementById('userAvatar').style.display = 'block';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('upload-section').style.display = 'block';
            
            const snap = await db.ref('users/' + user.uid).once('value');
            if (snap.exists()) {
                document.getElementById('displayNick').innerText = snap.val().nick;
                document.getElementById('displayID').innerText = "ID: " + snap.val().shortID;
                document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/50';
            }
        }
    });

    // Галерея (Синхронизация)
    db.ref('gallery').limitToLast(10).on('value', snap => {
        const h = document.getElementById('home-gallery');
        const f = document.getElementById('full-gallery');
        h.innerHTML = f.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const html = `<div class="card"><img src="${d.url}"><div style="padding:10px"><b>${d.author}</b><br><small>${d.desc}</small></div></div>`;
            h.innerHTML = html + h.innerHTML;
            f.innerHTML = html + f.innerHTML;
        });
    });

    // Навигация
    function showPage(id, bg) {
        document.getElementById('bgLayer').style.backgroundImage = `url('${bg}')`;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Загрузка (на твою функцию)
    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        const desc = document.getElementById('userDesc').value;
        const user = auth.currentUser;
        if(!file || !user) return;

        document.getElementById('statusMsg').innerText = "⏳ Загрузка...";
        const ref = storage.ref('submissions/' + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();

        const userSnap = await db.ref('users/' + user.uid).once('value');
        const nick = userSnap.exists() ? userSnap.val().nick : user.displayName;

        await fetch("https://us-central1-cubix-web.cloudfunctions.net/sendtotelegram", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                photoUrl: url, 
                author: nick, 
                desc: desc,
                time: new Date().toLocaleString()
            })
        });
        document.getElementById('statusMsg').innerText = "✅ Готово!";
    }
</script>
</body>
</html>
